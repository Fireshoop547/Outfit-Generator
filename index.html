<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfit Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0a;
            --surface: #111;
            --border: #1e1e1e;
            --text: #f0f0f0;
            --muted: #555;
            --accent: #fff;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── PAGE LOAD COVER ── */
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #loader.hidden { opacity: 0; visibility: hidden; }
        .loader-text {
            font-family: 'Anton', sans-serif;
            font-size: clamp(2rem, 6vw, 4rem);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #fff;
            animation: loaderPulse 1s ease-in-out infinite alternate;
        }
        @keyframes loaderPulse {
            from { opacity: 0.3; }
            to   { opacity: 1; }
        }

        /* ── SCROLL REVEAL ── */
        [data-reveal] {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }
        [data-reveal].is-inview {
            opacity: 1;
            transform: translateY(0);
        }
        [data-reveal][data-delay="1"] { transition-delay: 0.1s; }
        [data-reveal][data-delay="2"] { transition-delay: 0.2s; }
        [data-reveal][data-delay="3"] { transition-delay: 0.3s; }
        [data-reveal][data-delay="4"] { transition-delay: 0.4s; }
        [data-reveal][data-delay="5"] { transition-delay: 0.5s; }
        [data-reveal][data-delay="6"] { transition-delay: 0.6s; }

        /* ── NAV ── */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,10,10,0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 58px;
        }
        .nav-logo {
            font-family: 'Anton', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #fff;
        }
        .nav-tabs { display: flex; gap: 4px; }
        .nav-tab {
            background: none;
            border: none;
            color: #555;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 7px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: color 0.2s, background 0.2s;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .nav-tab:hover { color: #fff; background: #1a1a1a; }
        .nav-tab.active { color: #fff; background: #1f1f1f; }

        /* ── PAGES ── */
        .page { display: none; }
        .page.active { display: block; }

        /* ════════════════════════════
           MARQUEE
        ════════════════════════════ */
        .marquee-wrap {
            overflow: hidden;
            border-top: 1px solid #1a1a1a;
            border-bottom: 1px solid #1a1a1a;
            background: #0d0d0d;
            padding: 10px 0;
        }
        .marquee-track {
            display: flex;
            gap: 0;
            width: max-content;
            animation: marquee 28s linear infinite;
        }
        .marquee-track:hover { animation-play-state: paused; }
        .marquee-item {
            font-family: 'Anton', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #333;
            padding: 0 32px;
            white-space: nowrap;
        }
        .marquee-item.hot { color: #888; }
        .marquee-sep {
            color: #222;
            font-size: 0.6rem;
            align-self: center;
        }
        @keyframes marquee {
            from { transform: translateX(0); }
            to   { transform: translateX(-50%); }
        }

        /* ════════════════════════════
           TAB 1 — HOME
        ════════════════════════════ */
        .hero {
            min-height: calc(100vh - 58px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 24px 60px;
            position: relative;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 70% 55% at 50% 45%, rgba(255,255,255,0.035) 0%, transparent 65%);
            pointer-events: none;
        }
        /* word-by-word reveal */
        .hero-title {
            font-family: 'Anton', sans-serif;
            font-size: clamp(3rem, 9vw, 7.5rem);
            line-height: 1.0;
            letter-spacing: -0.01em;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .hero-word {
            display: inline-block;
            opacity: 0;
            transform: translateY(60px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            margin-right: 0.22em;
        }
        .hero-word.revealed {
            opacity: 1;
            transform: translateY(0);
        }
        .hero-word.dim { color: #333; }
        .hero-sub {
            font-size: 1rem;
            color: #444;
            max-width: 420px;
            line-height: 1.7;
            margin-bottom: 44px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 0.8s, transform 0.6s ease 0.8s;
        }
        .hero-sub.revealed { opacity: 1; transform: translateY(0); }
        .hero-cta {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #fff;
            color: #000;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            padding: 16px 40px;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease 1s, transform 0.6s ease 1s, background 0.2s, box-shadow 0.2s;
        }
        .hero-cta.revealed { opacity: 1; transform: translateY(0); }
        .hero-cta:hover {
            background: #e8e8e8;
            box-shadow: 0 16px 40px rgba(255,255,255,0.1);
        }
        .hero-cta .arrow { transition: transform 0.2s; }
        .hero-cta:hover .arrow { transform: translateX(5px); }

        /* trending cards on home */
        .trending-strip {
            margin-top: 80px;
            width: 100%;
            max-width: 700px;
        }
        .trending-strip-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #333;
            margin-bottom: 18px;
        }
        .trending-cards {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .trending-card {
            background: #0f0f0f;
            border: 1px solid #1e1e1e;
            border-radius: 14px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 180px;
            transition: border-color 0.3s, transform 0.2s;
        }
        .trending-card:hover { transform: translateY(-3px); }
        .trending-card.rank-1 { border-color: #d4af37; }
        .trending-card.rank-2 { border-color: #666; }
        .trending-card.rank-3 { border-color: #7a3b1e; }
        .trending-medal { font-size: 1.5rem; }
        .trending-info { display: flex; flex-direction: column; gap: 3px; }
        .trending-lbl { font-size: 0.62rem; color: #444; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
        .trending-name { font-family: 'Anton', sans-serif; font-size: 1rem; letter-spacing: 0.04em; text-transform: uppercase; color: #fff; }
        .trending-updated { font-size: 0.65rem; color: #333; margin-top: 16px; text-align: center; }

        /* ════════════════════════════
           TAB 2 — GENERATOR
        ════════════════════════════ */
        .generator-page {
            padding: 64px 24px 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page-heading {
            font-family: 'Anton', sans-serif;
            font-size: clamp(2.2rem, 5vw, 4rem);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 8px;
            text-align: center;
        }
        .page-sub {
            font-size: 0.88rem;
            color: #444;
            margin-bottom: 48px;
            text-align: center;
        }
        .fit-style-label {
            font-family: 'Anton', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 4px;
        }
        .fit-counter {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #444;
            margin-bottom: 20px;
        }
        .fit-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
        }
        .fit-slides { min-width: 280px; }
        .clothing-row {
            display: flex;
            flex-direction: column;
            width: 280px;
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 18px;
            overflow: hidden;
            transition: box-shadow 0.3s;
        }
        .clothing-row:hover { box-shadow: 0 0 0 1px #2a2a2a, 0 20px 50px rgba(0,0,0,0.5); }
        .clothing-row.hidden { display: none; }
        .item-card {
            width: 100%;
            text-align: center;
            border-bottom: 1px solid #161616;
            transition: background 0.2s;
            text-decoration: none;
            display: block;
            color: inherit;
        }
        .item-card:last-child { border-bottom: none; }
        .item-card:hover { background: #161616; }
        .item-card img {
            width: 100%;
            height: 185px;
            object-fit: contain;
            background: #111;
            display: block;
        }
        .item-card .img-placeholder {
            width: 100%;
            height: 185px;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        .item-info { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
        .item-info-left { display: flex; flex-direction: column; gap: 2px; }
        .item-slot-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #333; }
        .item-name { font-size: 0.82rem; font-weight: 600; color: #bbb; }
        .item-price { font-size: 0.82rem; color: #555; }
        .store-badge {
            font-size: 0.6rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #000;
            background: #fff;
            padding: 3px 8px;
            border-radius: 50px;
            flex-shrink: 0;
        }
        .arrow-btn {
            width: 48px;
            height: 48px;
            border: 1px solid #222;
            background: #111;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .arrow-btn:hover { background: #fff; color: #000; border-color: #fff; transform: scale(1.08); }
        /* no-products fallback */
        .gen-empty {
            text-align: center;
            padding: 60px 24px;
            color: #333;
        }
        .gen-empty code {
            background: #161616;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 14px 20px;
            display: inline-block;
            font-size: 0.85rem;
            color: #888;
            margin-top: 16px;
            font-family: monospace;
        }

        /* ════════════════════════════
           TAB 3 — STYLES
        ════════════════════════════ */
        .styles-page {
            padding: 64px 24px 100px;
            max-width: 1120px;
            margin: 0 auto;
        }
        .styles-filter {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 36px;
        }
        .filter-btn {
            background: #111;
            border: 1px solid #1e1e1e;
            color: #555;
            font-family: 'Inter', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
        }
        .styles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
        }
        .style-card {
            background: #0f0f0f;
            border: 1px solid #1a1a1a;
            border-radius: 16px;
            padding: 22px 20px;
            transition: border-color 0.2s, transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }
        .style-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.03) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .style-card:hover {
            border-color: #2a2a2a;
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.5);
        }
        .style-card:hover::before { opacity: 1; }
        .style-card.trending-now { border-color: #d4af37; }
        .trending-badge {
            display: none;
            position: absolute;
            top: 14px;
            right: 14px;
            background: #d4af37;
            color: #000;
            font-size: 0.58rem;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 50px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .style-card.trending-now .trending-badge { display: block; }
        .style-emoji { font-size: 1.5rem; margin-bottom: 10px; }
        .style-name { font-family: 'Anton', sans-serif; font-size: 1.05rem; letter-spacing: 0.04em; text-transform: uppercase; color: #fff; margin-bottom: 8px; }
        .style-desc { font-size: 0.8rem; color: #4a4a4a; line-height: 1.65; margin-bottom: 14px; }
        .style-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .style-tag { background: #161616; border: 1px solid #242424; color: #555; font-size: 0.68rem; padding: 3px 10px; border-radius: 50px; }

    </style>
</head>
<body>

    <!-- LOADER -->
    <div id="loader"><span class="loader-text">Outfit Generator</span></div>

    <!-- NAV -->
    <nav>
        <span class="nav-logo">Outfit Generator</span>
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showPage('home', this)">Home</button>
            <button class="nav-tab" onclick="showPage('generator', this)">Generator</button>
            <button class="nav-tab" onclick="showPage('styles', this)">Styles</button>
        </div>
    </nav>

    <!-- MARQUEE -->
    <div class="marquee-wrap" id="marqueeWrap">
        <div class="marquee-track" id="marqueeTrack">
            <!-- filled by JS -->
        </div>
    </div>

    <!-- ═══ PAGE: HOME ═══ -->
    <div class="page active" id="page-home">
        <section class="hero">
            <h1 class="hero-title" id="heroTitle"></h1>
            <p class="hero-sub" id="heroSub">Discover your next fit. Built from real-time fashion trends across 26 top style publications.</p>
            <button class="hero-cta" id="heroCta" onclick="showPage('generator', document.querySelectorAll('.nav-tab')[1])">
                Generate My Fit <span class="arrow">→</span>
            </button>

            <div class="trending-strip" data-reveal data-delay="5">
                <p class="trending-strip-label">Trending Right Now</p>
                <div class="trending-cards">
                    <div class="trending-card rank-1"><span class="trending-medal">🥇</span><div class="trending-info"><span class="trending-lbl">Top Style</span><span class="trending-name" id="trend1">—</span></div></div>
                    <div class="trending-card rank-2"><span class="trending-medal">🥈</span><div class="trending-info"><span class="trending-lbl">Rising</span><span class="trending-name" id="trend2">—</span></div></div>
                    <div class="trending-card rank-3"><span class="trending-medal">🥉</span><div class="trending-info"><span class="trending-lbl">Hot</span><span class="trending-name" id="trend3">—</span></div></div>
                </div>
                <p class="trending-updated" id="homeUpdated"></p>
            </div>
        </section>
    </div>

    <!-- ═══ PAGE: GENERATOR ═══ -->
    <div class="page" id="page-generator">
        <div class="generator-page">
            <h2 class="page-heading" data-reveal>Outfit Generator</h2>
            <p class="page-sub" data-reveal data-delay="1">Swipe through fits — find your next look.</p>
            <div id="genContent" data-reveal data-delay="2"></div>
        </div>
    </div>

    <!-- ═══ PAGE: STYLES ═══ -->
    <div class="page" id="page-styles">
        <div class="styles-page">
            <h2 class="page-heading" data-reveal>Style Guide</h2>
            <p class="page-sub" data-reveal data-delay="1">Every aesthetic explained — find yours.</p>
            <div class="styles-filter" data-reveal data-delay="2">
                <button class="filter-btn active" onclick="filterStyles('all', this)">All</button>
                <button class="filter-btn" onclick="filterStyles('core', this)">Core</button>
                <button class="filter-btn" onclick="filterStyles('trending', this)">Trending</button>
                <button class="filter-btn" onclick="filterStyles('classic', this)">Classic</button>
                <button class="filter-btn" onclick="filterStyles('sustainable', this)">Sustainable</button>
            </div>
            <div class="styles-grid" id="stylesGrid"></div>
        </div>
    </div>

    <script src="trending_styles_data.js"></script>
    <script src="products_data.js" onerror="window.OUTFIT_PRODUCTS=null"></script>
    <script>
        // ── LOADER ──
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                animateHero();
            }, 700);
        });

        // ── HERO WORD REVEAL ──
        const heroWords = [
            { text: 'Welcome', dim: false },
            { text: 'To',      dim: true  },
            { text: 'Outfit',  dim: false },
            { text: 'Generator', dim: false },
        ];
        function animateHero() {
            const title = document.getElementById('heroTitle');
            heroWords.forEach((w, i) => {
                const span = document.createElement('span');
                span.className = 'hero-word' + (w.dim ? ' dim' : '');
                span.textContent = w.text;
                title.appendChild(span);
                setTimeout(() => span.classList.add('revealed'), 200 + i * 150);
            });
            setTimeout(() => {
                document.getElementById('heroSub').classList.add('revealed');
                document.getElementById('heroCta').classList.add('revealed');
            }, 900);
        }

        // ── SCROLL REVEAL (IntersectionObserver — same pattern as phamilypharma) ──
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    e.target.classList.add('is-inview');
                    revealObserver.unobserve(e.target);
                }
            });
        }, { threshold: 0.12 });

        function observeRevealElements() {
            document.querySelectorAll('[data-reveal]').forEach(el => {
                el.classList.remove('is-inview');
                revealObserver.observe(el);
            });
        }
        observeRevealElements();

        // ── TAB SWITCHING ──
        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            btn.classList.add('active');
            // re-observe reveal elements on new page
            setTimeout(observeRevealElements, 50);
        }

        // ── OUTFIT CAROUSEL ──
        const SLOT_EMOJI = { top: '👕', bottom: '👖', shoes: '👟' };
        const SLOT_LABEL = { top: 'Top', bottom: 'Bottom', shoes: 'Shoes' };

        let currentFit = 0;
        let genFits = [];

        function buildItemCard(item) {
            if (!item) return '';
            const imgHtml = item.image
                ? `<img src="${item.image}" alt="${item.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'img-placeholder\\'>${SLOT_EMOJI[item.slot] || '👔'}</div>'">`
                : `<div class="img-placeholder">${SLOT_EMOJI[item.slot] || '👔'}</div>`;
            const priceHtml = item.price ? `<span class="item-price">${item.price}</span>` : '';
            const badge = item.store ? `<span class="store-badge">${item.store}</span>` : '';
            const tag = item.url ? 'a' : 'div';
            const href = item.url ? `href="${item.url}" target="_blank" rel="noopener"` : '';
            return `<${tag} class="item-card" ${href}>
                ${imgHtml}
                <div class="item-info">
                    <div class="item-info-left">
                        <span class="item-slot-label">${SLOT_LABEL[item.slot] || item.slot}</span>
                        <span class="item-name">${item.name}</span>
                        ${priceHtml}
                    </div>
                    ${badge}
                </div>
            </${tag}>`;
        }

        function buildStaticFits() {
            // Fallback fits using local pics when no products_data.js exists
            return [
                {
                    style: 'streetwear',
                    items: [
                        { slot: 'top',    name: 'Black Tee',   price: '$24.99', image: 'pics/black tee.png',       url: '', store: '' },
                        { slot: 'bottom', name: 'Blue Jeans',  price: '$59.99', image: 'pics/blue jean-dragon.png', url: '', store: '' },
                        { slot: 'shoes',  name: 'Nike Dunk',   price: '$120.00',image: 'pics/Nike-Dunk.png',       url: '', store: '' },
                    ],
                },
            ];
        }

        function renderGenerator(fits) {
            genFits = fits;
            const total = fits.length;
            if (total === 0) {
                document.getElementById('genContent').innerHTML = `
                    <div class="gen-empty">
                        <p style="color:#444;font-size:.9rem">No fits generated yet.</p>
                        <code>python fetch_products.py</code>
                        <p style="margin-top:12px;font-size:.78rem;color:#333">Run the script with your Apify key to pull real products.</p>
                    </div>`;
                return;
            }

            const slidesHtml = fits.map((fit, i) =>
                `<div class="clothing-row fit-slide${i !== 0 ? ' hidden' : ''}" data-fit="${i}">
                    ${fit.items.filter(Boolean).map(buildItemCard).join('')}
                </div>`
            ).join('');

            document.getElementById('genContent').innerHTML = `
                <p class="fit-style-label" id="fitStyleLabel">${fits[0].style.toUpperCase()}</p>
                <p class="fit-counter" id="fitCounter">Fit 1 of ${total}</p>
                <div class="fit-container">
                    <button class="arrow-btn" onclick="prevFit()">←</button>
                    <div class="fit-slides">${slidesHtml}</div>
                    <button class="arrow-btn" onclick="nextFit()">→</button>
                </div>`;
        }

        function showFit(n) {
            const total = genFits.length;
            if (!total) return;
            currentFit = ((n % total) + total) % total;
            document.querySelectorAll('.fit-slide').forEach((s, i) => s.classList.toggle('hidden', i !== currentFit));
            document.getElementById('fitCounter').textContent = 'Fit ' + (currentFit + 1) + ' of ' + total;
            const lbl = document.getElementById('fitStyleLabel');
            if (lbl && genFits[currentFit]) lbl.textContent = genFits[currentFit].style.toUpperCase();
        }
        function prevFit() { showFit(currentFit - 1); }
        function nextFit() { showFit(currentFit + 1); }

        // Load fits — prefer Apify data, fall back to static
        (function initGenerator() {
            if (window.OUTFIT_PRODUCTS && window.OUTFIT_PRODUCTS.fits && window.OUTFIT_PRODUCTS.fits.length) {
                renderGenerator(window.OUTFIT_PRODUCTS.fits);
            } else {
                renderGenerator(buildStaticFits());
            }
        })();

            { name: 'Sustainable',     emoji: '♻️', cat: 'sustainable',  img: '1489987707849-4cfca95b5a83', desc: 'Ethical and eco-conscious. Organic fabrics, fair trade, mindful consumption.', tags: ['organic', 'ethical', 'eco', 'conscious'] },
            { name: 'Slow Fashion',    emoji: '🌱', cat: 'sustainable',  img: '1558618666-fcd25c85cd64', desc: 'Fewer, better pieces. Anti-fast-fashion, focused on longevity.', tags: ['quality', 'longevity', 'investment', 'craftsmanship'] },
            { name: 'Vintage',         emoji: '🕰️', cat: 'sustainable', img: '1509631179647-0177331693ae', desc: 'Pre-loved fashion from past decades. Unique, sustainable, higher quality.', tags: ['thrifted', 'pre-loved', 'unique', 'decades'] },
            { name: 'Upcycled',        emoji: '🔄', cat: 'sustainable',  img: '1523381294911-8d3cead13475', desc: 'Transformed and remade. New life through creative alterations and DIY redesigns.', tags: ['DIY', 'remade', 'creative', 'transformed'] },
        ];

        let trendingStyleName = '';

        function renderStyles(filter) {
            const grid = document.getElementById('stylesGrid');
            const list = filter === 'all' ? stylesData : stylesData.filter(s => s.cat === filter);
            grid.innerHTML = list.map((s, i) => {
                const isTrending = trendingStyleName && s.name.toLowerCase() === trendingStyleName.toLowerCase();
                const delay = (i % 4) + 1;
                return `<div class="style-card ${isTrending ? 'trending-now' : ''}" data-reveal data-delay="${delay}">
                    <span class="trending-badge">🔥 Trending</span>
                    <div class="style-emoji">${s.emoji}</div>
                    <div class="style-name">${s.name}</div>
                    <div class="style-desc">${s.desc}</div>
                    <div class="style-tags">${s.tags.map(t => `<span class="style-tag">${t}</span>`).join('')}</div>
                </div>`;
            }).join('');
            setTimeout(observeRevealElements, 30);
        }

        function filterStyles(filter, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderStyles(filter);
        }

        // ── MARQUEE (filled by JS so we can duplicate for seamless loop) ──
        function buildMarquee(styles) {
            const items = styles.length
                ? styles.slice(0, 10).map(s => s.style)
                : ['streetwear','y2k','dark academia','quiet luxury','gorpcore','cottagecore','clean girl','barbiecore','balletcore','old money'];
            const track = document.getElementById('marqueeTrack');
            // duplicate for seamless infinite scroll
            const html = [...items, ...items].map((name, i) =>
                `<span class="marquee-item${i < items.length ? ' hot' : ''}">${name.toUpperCase()}</span><span class="marquee-sep">✦</span>`
            ).join('');
            track.innerHTML = html;
        }

        // ── TRENDING DATA ──
        function loadTrending(data) {
            const top = (data.trending_styles || []).slice(0, 3);
            ['trend1','trend2','trend3'].forEach((id, i) => {
                const el = document.getElementById(id);
                if (el && top[i]) el.textContent = top[i].style.toUpperCase();
            });
            if (top[0]) trendingStyleName = top[0].style;
            const upd = document.getElementById('homeUpdated');
            if (upd && data.date) upd.textContent = 'Updated ' + data.date;
            buildMarquee(data.trending_styles || []);
            renderStyles('all');
        }

        // ── INIT ──
        (function init() {
            buildMarquee([]);
            renderStyles('all');
            if (window.TRENDING_STYLES && window.TRENDING_STYLES.trending_styles) {
                loadTrending(window.TRENDING_STYLES);
                return;
            }
            fetch('trending_styles.json')
                .then(r => r.ok ? r.json() : Promise.reject())
                .then(loadTrending)
                .catch(() => {});
        })();
    </script>
